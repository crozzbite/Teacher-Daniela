name: Bones CI/CD (SkullRender Standard)

on:
  push:
    branches: [ main, feat/pure-bones-refactor ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 💀 Checkout code
        uses: actions/checkout@v4

      - name: 🧠 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🦴 Install dependencies
        run: bun install

      - name: 🏗️ Build Application
        run: bun run build

      - name: 🚀 Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/pure-bones-refactor')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/daniela-english-coaching/browser
