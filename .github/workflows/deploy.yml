name: Bones CI/CD (SkullRender Standard)

on:
  push:
    branches: [ main, feat/pure-bones-refactor ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 💀 Checkout code
        uses: actions/checkout@v4

      - name: 🧠 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🦴 Install dependencies
        run: bun install

      - name: 🏗️ Build Application
        run: bun run build

      - name: 🔍 Debug Output Structure
        run: |
          ls -R dist/
          
      - name: 📤 Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ajustamos la ruta para asegurar que encuentre los archivos estáticos
          path: ./dist/daniela-english-coaching/browser/

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/pure-bones-refactor')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
